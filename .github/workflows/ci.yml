name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Restore backend
        run: dotnet restore backend/FrpcManager.Api/FrpcManager.Api.csproj

      - name: Build backend
        run: dotnet build backend/FrpcManager.Api/FrpcManager.Api.csproj --no-restore

      - name: Audit backend packages
        run: dotnet list backend/FrpcManager.Api/FrpcManager.Api.csproj package --vulnerable --include-transitive

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Audit frontend packages
        working-directory: frontend
        run: npm audit --audit-level=moderate

      - name: Build Docker image
        run: docker build -t frpc-manager:ci .
